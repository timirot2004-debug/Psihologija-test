<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vsa Vprašanja iz PDF</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .quiz-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 800px; width: 100%; position: relative; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h2 { color: #2c3e50; margin: 0; font-size: 1.3em; }
        .stats { font-weight: bold; color: #7f8c8d; }
        .question { font-size: 1.15em; margin-bottom: 20px; color: #2c3e50; font-weight: 600; line-height: 1.4; }
        .options { display: grid; gap: 10px; }
        button.option-btn { padding: 14px; border: 2px solid #ecf0f1; border-radius: 8px; background: #fff; cursor: pointer; transition: 0.2s; text-align: left; font-size: 1em; color: #34495e; }
        button.option-btn:hover:not(:disabled) { background: #f8f9fa; border-color: #3498db; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; text-align: center; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; display: none; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.3s; border-radius: 4px; }
        
        /* Novi gumb FF */
        #ff-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            opacity: 0.7;
            transition: 0.3s;
        }
        #ff-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="quiz-container">
    <button id="ff-btn" onclick="trySurrender()">FF</button>
    <div class="header">
        <h2 id="cat-display">Vprašanja</h2>
        <div class="stats">Rezultat: <span id="score">0</span> / <span id="answered">0</span></div>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="quiz-content">
        <div id="question-text" class="question">Nalaganje...</div>
        <div id="options-container" class="options"></div>
        <div id="feedback"></div>
        <button id="next-btn">Naslednje vprašanje</button>
    </div>
</div>

<script>
   const questions = [
{ q: "1. Katera opredelitev pojma »nezavedno« je ustrezna?", a: "So duševne vsebine, ki niso dostopne zavesti, vendar vplivajo na naše doživljanje in obnašanje.", o: ["So duševne vsebine, ki se jih trenutno ne zavedamo, a jih lahko neovirano prikličemo v zavest.", "So duševne vsebine, ki niso dostopne zavesti in tudi nimajo nobenega vpliva na naše doživljanje in obnašanje.", "So duševne vsebine, ki so sicer dostopne zavesti, a jih trenutno ne moremo priklicati v zavest.", "So duševne vsebine, ki niso dostopne zavesti, vendar vplivajo na naše doživljanje in obnašanje."] },
{ q: "2. Katera izmed navedenih značilnosti sodi med značajske lastnosti?", a: "Poštenost.", o: ["Mirnost.", "Inteligentnost.", "Poštenost.", "Impulzivnost."] },
{ q: "3. Introspekcija je metoda opazovanja, ki je posebnost psihologije. Katerega od spodnjih pojavov NE moremo preučevati z introspekcijo?", a: "Doživljanja bolečine pri živali.", o: ["Vsebine sanj pri odrasli osebi.", "Razmišljanja pri študentu.", "Doživljanja bolečine pri študentu.", "Doživljanja bolečine pri živali."] },
{ q: "4. V čem se kaže miselna prožnost (fleksibilnost) kot značilnost divergentnega mišljenja?", a: "V navajanju različnih idej iz različnih kategorij.", o: ["V hitrem navajanju številnih idej.", "V navajanju različnih idej iz različnih kategorij.", "V navajanju redkih ali neponovljivih idej.", "V navajanju običajnih, preizkušenih idej."] },
{ q: "5. Kaj se dogaja v fazi inkubacije v ustvarjalnem procesu?", a: "Problem se rešuje na nezavedni ravni.", o: ["Zbiramo podatke o problemu.", "Preverjamo ustreznost rešitve.", "Problem se rešuje na nezavedni ravni.", "Problem nenadoma zagledamo v novi luči."] },
{ q: "6. Kateri izmed navedenih dejavnikov spodbuja ustvarjalnost?", a: "Radovednost.", o: ["Strogo upoštevanje pravil.", "Zelo visoka inteligentnost.", "Zanašanje na logiko.", "Radovednost."] },
{ q: "7. Katera izmed navedenih skupin NE sodi med referenčne skupine?", a: "Poslušalci koncerta.", o: ["Snemalna ekipa.", "Poslušalci koncerta.", "Projektna skupina.", "Družina."] },
{ q: "8. Ko na novo nastaja neka skupina, prehaja skozi več razvojnih stopenj. Te stopnje smo poimenovali: 1. oblikovanje (spoznavanje), 2. nasprotovanje, 3. pristajanje (povezovanje) in 4. izvajanje (sodelovanje). Kaj se med drugim dogaja v tretji stopnji razvoja skupine?", a: "Začne se živahnejša medsebojna komunikacija.", o: ["Nekateri člani se izolirajo ali zavračajo naloge.", "Člani tehtajo, ali bi podprli ali bi nasprotovali vodji.", "Začne se živahnejša medsebojna komunikacija.", "Člani iščejo vsak svoje mesto in vlogo v skupini."] },
{ q: "9. Na kaj se nanaša oz. s čim se povezuje »timska vloga« v skupini (po Belbinu)?", a: "Na posameznikove osebnostne lastnosti.", o: ["Na posameznikove osebnostne lastnosti.", "Na posameznikovo strokovno znanje.", "Na posameznikovo starost in izkušnje.", "Na posameznikovo telesno vzdržljivost."] },
{ q: "10. Pri oblikovanju seznama prednostnih nalog imajo prioriteto", a: "pomembne nujne naloge.", o: ["manj pomembne nujne naloge.", "pomembne ne nujne naloge.", "pomembne nujne naloge.", "nepomembne ne nujne naloge."] },
{ q: "11. Katera trditev je pravilna?", a: "Vodja ne more organizirati drugih, dokler ne zna organizirati sebe.", o: ["Vodja ne more organizirati drugih, dokler ne zna organizirati sebe.", "Vodja mora najprej organizirati druge, da bo lahko organiziral sebe.", "Organiziranje dela sodelavcev ni naloga vodje.", "Delo okrog organiziranja dela nam jemlje dragoceni čas."] },
{ q: "12. Kaj je naloga vodje, kadar nekateri sodelavci (podrejeni) presegajo običajne cilje?", a: "Določiti posebne cilje, ki jim bodo v izziv in jih tudi posebej nagraditi.", o: ["Določiti jim nekaj posebnih ciljev, nagrajevanje ni toliko pomembno.", "Določiti posebne cilje, ki jim bodo v izziv in jih tudi posebej nagraditi.", "Opozoriti druge sodelavce, naj jim predajo nekaj svojih nalog.", "Paziti, da bo takim sodelavcem drugič v osnovi dodelil težje naloge."] },
{ q: "13. Ljudje v vsakodnevnem življenju in pri delu zadovoljujemo različne potrebe. Mnogo potreb je primarnih (tako med biološkimi, kot med psihološkimi), mnoge pa sodijo med sekundarne. Katera izmed spodaj navedenih potreb NE sodi med primarne potrebe?", a: "Potreba po igranju nogometa.", o: ["Potreba po pitju tekočine.", "Potreba po igranju nogometa.", "Potreba po stalni telesni temperaturi.", "Potreba po druženju z drugimi ljudmi."] },
{ q: "14. Katera trditev o stresu NE drži?", a: "Vsak stres je škodljiv, ker pomeni obremenitev za organizem.", o: ["Stres je odziv organizma na dražljaje, ki zmotijo njegovo ravnotežje.", "Izguba službe je navadno za ljudi stresna.", "Tudi praznovanja (npr. božiča, rojstnega dne) so stresni dogodki.", "Vsak stres je škodljiv, ker pomeni obremenitev za organizem."] },
{ q: "15. Katera izjava ponazarja psihosomatsko motnjo?", a: "»Vedno, ko se približuje snemanje, dobim migreno.«", o: ["»Zaskrbljen sem zaradi bližajočega snemanja.«", "»Utrujen sem zaradi napornega snemanja.«", "»Vedno, ko se približuje snemanje, dobim migreno.«", "»Srce mi močneje utripa, ker se čez nekaj minut začne snemanje.«"] },
{ q: "16. Pri reševanju medsebojnih konfliktov poznamo različne strategije. Kadar posamezniku niso pomembne niti lastne potrebe, niti potrebe drugega udeleženca, govorimo o strategiji", a: "izogibanje, nevtralnost.", o: ["izogibanje, nevtralnost.", "kompromis.", "prilagajanje, podreditev.", "dogovarjanje, reševanje izvornega problema."] },
{ q: "17. Janez je filmski producent in pri svojem delu veliko komunicira z režiserji. Mnenja je, da je z ljudmi, s katerimi neposredno dela, potrebno vedno ohranjati dobre odnose. Zato tudi takrat, ko njegovi cilji niso usklajeni s cilji kakega režiserja, raje nekoliko popusti, da ohrani dober medsebojni odnos. Kateri način reševanja medsebojnih konfliktov navadno uporablja Janez?", a: "Prilagajanje.", o: ["Izogibanje.", "Prevladovanje.", "Prilagajanje.", "Kompromis."] },
{ q: "18. Značilnost strategije PRILAGAJANJE pri reševanju konfliktov je", a: "podreditev drugemu človeku, da ohranimo dober medsebojni odnos.", o: ["žrtvovanje nekaj svojih ciljev, da najdemo z drugim človekom neko skupno rešitev.", "nepomembnost lastnih potreb in nepomembnost potreb drugega človeka.", "podreditev drugemu človeku, da ohranimo dober medsebojni odnos.", "visoka zaskrbljenost za lastne potrebe in za potrebe drugega človeka."] }
   ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // 2. Premešaj vprašanja takoj na začetku
    shuffleArray(questions);

    let currentQuestions = [...questions];
    let score = 0;
    let answered = 0;

    const qText = document.getElementById("question-text");
    const optCont = document.getElementById("options-container");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const scoreDisp = document.getElementById("score");
    const ansDisp = document.getElementById("answered");
    const progressFill = document.getElementById("progress-fill");

    function loadQuestion() {
        if (currentQuestions.length === 0) {
            showResult();
            return;
        }

        const q = currentQuestions[0];
        // Opcijsko: premešaj še vrstni red odgovorov
        shuffleArray(q.o);

        qText.innerText = q.q;
        optCont.innerHTML = "";
        feedback.style.display = "none";
        nextBtn.style.display = "none";

        q.o.forEach(opt => {
            const btn = document.createElement("button");
            btn.classList.add("option-btn");
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.a);
            optCont.appendChild(btn);
        });

        const progress = ((questions.length - currentQuestions.length) / questions.length) * 100;
        progressFill.style.width = progress + "%";
    }

    function checkAnswer(btn, selected, correct) {
        const all = optCont.querySelectorAll(".option-btn");
        all.forEach(b => b.disabled = true);

        answered++;
        if (selected === correct) {
            score++;
            btn.classList.add("correct");
            feedback.innerText = "Pravilno! ✅";
            feedback.style.display = "block";
            feedback.style.color = "#155724";
            feedback.style.backgroundColor = "#d4edda";
        } else {
            btn.classList.add("wrong");
            feedback.innerText = "Napačno. Pravilen odgovor: " + correct;
            feedback.style.display = "block";
            feedback.style.color = "#721c24";
            feedback.style.backgroundColor = "#f8d7da";
            
            all.forEach(b => {
                if (b.innerText === correct) b.classList.add("correct");
            });
        }

        scoreDisp.innerText = score;
        ansDisp.innerText = answered;
        nextBtn.style.display = "block";
    }

    nextBtn.onclick = () => {
        currentQuestions.shift();
        loadQuestion();
    };

    // FF LOGIKA: 10% šanse
    function trySurrender() {
        const chance = Math.random();
        if (chance < 0.1) {
            showResult(); 
        } else {
            alert("Surrender vote failed, because your bot lane is retarded.");
        }
    }

    function showResult() {
        const ffBtn = document.getElementById("ff-btn");
        if(ffBtn) ffBtn.style.display = "none";
        
        const pct = Math.round((score / questions.length) * 100);
        document.getElementById("quiz-content").innerHTML = `
            <div style="text-align:center; padding:20px;">
                <h3>Kviz končan!</h3>
                <p style="font-size:1.5em;">Dosegel si <strong>${score} od ${questions.length}</strong> točk.</p>
                <p>Uspešnost: ${pct}%</p>
                <button onclick="location.reload()" style="padding:10px 20px; background:#3498db; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Ponovi kviz</button>
            </div>
        `;
        progressFill.style.width = "100%";
    }

    loadQuestion();
</script>

</body>
</html>
